CORRUPTION:
  DATASET: imagenet_c
  SEVERITY:
    - 5
  TYPE:
    - gaussian_noise
    - shot_noise
    - impulse_noise
    - defocus_blur
    - glass_blur
    - motion_blur
    - zoom_blur
    - snow
    - frost
    - fog
    - brightness
    - contrast
    - elastic_transform
    - pixelate
    - jpeg_compression
MODEL:
  ADAPTATION: rmt
  ARCH: resnet50
OPTIM:
  BETA: 0.9
  LR: 0.01
  METHOD: SGD
  STEPS: 1
  WD: 0.0
RMT:
  # Source-free CTTA: no real labeled-source replay (DO-ALL uses distilled anchors instead).
  # The upstream default is 1.0; for this benchmark it must be 0.
  LAMBDA_CE_SRC: 0.0
TEST:
  BATCH_SIZE: 64
